name: Deploy Manyuka Farm

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify secrets exist
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "ERROR: SUPABASE_URL secret is missing!"
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_KEY }}" ]; then
            echo "ERROR: SUPABASE_KEY secret is missing!"
            exit 1
          fi
          echo "Both secrets are present"

      - name: Inject secrets into HTML
        run: |
          echo "Before injection:"
          grep -n "SUPABASE" index.html | head -3
          sed -i "s|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g" index.html
          sed -i "s|__SUPABASE_KEY__|${{ secrets.SUPABASE_KEY }}|g" index.html
          echo "After injection:"
          if grep -q "__SUPABASE_URL__\|__SUPABASE_KEY__" index.html; then
            echo "ERROR: Placeholders still present!"
            exit 1
          else
            echo "SUCCESS: Secrets injected"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

